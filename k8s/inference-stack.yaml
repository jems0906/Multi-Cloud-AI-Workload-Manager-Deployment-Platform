apiVersion: apps/v1
kind: Deployment
metadata:
  name: flexai-inference
  labels:
    app: flexai-inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flexai-inference
  template:
    metadata:
      labels:
        app: flexai-inference
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      restartPolicy: Always
      containers:
        - name: model-server
          image: registry.flexai.local/aws/vision-prod:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8080
          resources:
            requests:
              nvidia.com/gpu: 1
            limits:
              nvidia.com/gpu: 1
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flexai-inference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flexai-inference
  minReplicas: 1
  maxReplicas: 1000
  metrics:
    - type: Pods
      pods:
        metric:
          name: gpu_utilization
        target:
          type: AverageValue
          averageValue: "70"
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: flexai-inference
spec:
  hosts:
    - flexai-inference
  http:
    - route:
        - destination:
            host: flexai-inference
            subset: stable
          weight: 90
        - destination:
            host: flexai-inference
            subset: canary
          weight: 10
