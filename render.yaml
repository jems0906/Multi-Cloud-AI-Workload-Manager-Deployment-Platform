services:
  - type: web
    name: flexai-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: web
    name: flexai-dashboard
    env: node
    plan: free
    rootDir: dashboard
    buildCommand: npm ci && npm run build && printf "window.FLEXAI_API_URL='%s';\n" "$FLEXAI_API_URL" > dist/public-config.js
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: FLEXAI_API_URL
        value: https://flexai-api.onrender.com
