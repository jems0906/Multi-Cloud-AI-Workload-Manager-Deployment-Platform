name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        run: python -m pytest tests -q --tb=short

  dashboard-build:
    name: Dashboard Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: node ./node_modules/webpack/bin/webpack.js --mode production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/
          retention-days: 7

  smoke-test:
    name: Smoke Test (CLI + API)
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install CLI
        working-directory: cli
        run: pip install -e .

      - name: Start backend server
        working-directory: backend
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Wait for server readiness
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:8000/api/overview; then
              echo "Server ready"
              break
            fi
            echo "Waiting... ($i)"
            sleep 1
          done

      - name: CLI deploy
        run: |
          python -m flexai_sdk.main deploy examples/vision-service/model.ckpt \
            --model-name ci-test-model \
            --gpu A100 \
            --region us-east \
            --skip-docker \
            --api-url http://127.0.0.1:8000

      - name: CLI list
        run: python -m flexai_sdk.main list --api-url http://127.0.0.1:8000

      - name: CLI overview
        run: python -m flexai_sdk.main overview --api-url http://127.0.0.1:8000

      - name: Stop backend server
        if: always()
        run: kill $SERVER_PID || true
